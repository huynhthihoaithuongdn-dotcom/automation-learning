<!DOCTYPE html> 
<!--
    khai báo tài liệu html5
    Nếu ko có dòng này thì nghĩa là html bình thường. 
    HTML5 sẽ support nhiều định dạng hơn.
-->
<html lang="vi">
<!-- 
    in the beginning and the end: html là thể gốc, chứa toàn bộ ND của web
    Dòng mở đầu của câu lệnh là <html
    Dòng đóng câu lệnh là </html> 
-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiêu đề trang web</title>
</head>
<!--
    Header chứa thông tin page, metadata (ko quan trong lắm, chủ yếu giúp cho sale or MKT)
    <meta charset="value"> Trang html sd ngôn ngữ (t.anh, t.viêt,...)
    UTF-8: tiếng việt
    <title> </title> display tiêu đề trang web
-->
<body>
    <!-- Nội dung trang web ở đây -->
    <h1>Xin chào Automation Tester!</h1>
</body>
<!-- 
    Heading tags: HTML5 có h1 h2 h3 h4 h5 h6, mỗi h sẽ có mỗi cấp độ hiển thị khác nhau.
    Size chữ hiển thị theo cấp độ h. H1 to nhất (thường làm tiêu đề), h6 bé nhất. 
    Mở thể (tag): <h1> đóng tag: </h1>
-->

</html>
